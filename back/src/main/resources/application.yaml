spring:
  datasource:
    url: 'jdbc:postgresql://localhost:5433/backdronesdb'
    username: 'postgresuser'
    password: 'password'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        jdbc:
          time_zone: UTC
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: '8080'
  servlet:
    context-path: /api
