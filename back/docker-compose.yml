services:
  postgres:
    image: postgres:16
    container_name: back-drones-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgresuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: backdronesdb
    ports:
      - '5433:5432'
    volumes:
      - back-drones-postgres-data:/var/lib/postgresql/data
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgresuser -d backdronesdb']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  back-drones-postgres-data:
