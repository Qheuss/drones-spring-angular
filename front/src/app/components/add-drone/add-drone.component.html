<div class="card flex flex-col gap-6">
    <p-accordion>
        <p-accordion-panel value="0"
            ><p-accordion-header
                ><div class="flex flex-col gap-2">
                    <h2 class="text-2xl font-semibold">Create drone</h2>
                    <p class="text-sm opacity-70">Build a new drone profile by choosing each component.</p>
                </div></p-accordion-header
            >
            <p-accordion-content>
                <form class="grid grid-cols-1 md:grid-cols-2 gap-4" (ngSubmit)="submitDrone()">
                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-tag"></i>
                        </p-inputgroup-addon>
                        <input pInputText [(ngModel)]="drone.name" name="name" placeholder="Drone name" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-send"></i>
                        </p-inputgroup-addon>
                        <p-select [(ngModel)]="drone.videoLinkType" name="videoLinkType" [options]="videoLinkTypes" placeholder="Video link type" />
                    </p-inputgroup>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:col-span-2">
                        <p-inputgroup>
                            <p-inputgroup-addon>
                                <i class="pi pi-bolt"></i>
                            </p-inputgroup-addon>
                            <p-select [(ngModel)]="drone.prop" name="prop" [options]="(propOptions$ | async) ?? []" optionLabel="model" placeholder="Prop" [showClear]="true" />
                        </p-inputgroup>

                        <p-inputgroup>
                            <p-inputgroup-addon>
                                <i class="pi pi-hashtag"></i>
                            </p-inputgroup-addon>
                            <p-inputnumber [(ngModel)]="drone.propsCount" name="propsCount" [min]="1" [useGrouping]="false" placeholder="Props count" />
                        </p-inputgroup>
                    </div>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-gauge"></i>
                        </p-inputgroup-addon>
                        <p-inputnumber [(ngModel)]="drone.weightGrams" name="weightGrams" [min]="0" [useGrouping]="false" placeholder="Weight (g)" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-arrows-alt"></i>
                        </p-inputgroup-addon>
                        <p-inputnumber [(ngModel)]="drone.wheelbaseMm" name="wheelbaseMm" [min]="0" [useGrouping]="false" placeholder="Wheelbase (mm)" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-clock"></i>
                        </p-inputgroup-addon>
                        <p-inputnumber [(ngModel)]="drone.flightTimeMinutes" name="flightTimeMinutes" [min]="0" [useGrouping]="false" placeholder="Flight time (min)" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-cog"></i>
                        </p-inputgroup-addon>
                        <p-select [(ngModel)]="drone.motor" name="motor" [options]="(motorOptions$ | async) ?? []" optionLabel="model" placeholder="Motor" [showClear]="true" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-microchip"></i>
                        </p-inputgroup-addon>
                        <p-select [(ngModel)]="drone.flightController" name="flightController" [options]="(flightControllerOptions$ | async) ?? []" optionLabel="model" placeholder="Flight controller" [showClear]="true" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-video"></i>
                        </p-inputgroup-addon>
                        <p-select [(ngModel)]="drone.camera" name="camera" [options]="(cameraOptions$ | async) ?? []" optionLabel="model" placeholder="Camera" [showClear]="true" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-box"></i>
                        </p-inputgroup-addon>
                        <p-select [(ngModel)]="drone.frame" name="frame" [options]="(frameOptions$ | async) ?? []" optionLabel="model" placeholder="Frame" [showClear]="true" />
                    </p-inputgroup>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-bolt"></i>
                        </p-inputgroup-addon>
                        <p-select [(ngModel)]="drone.battery" name="battery" [options]="(batteryOptions$ | async) ?? []" optionLabel="model" placeholder="Battery" [showClear]="true" />
                    </p-inputgroup>

                    <div class="flex justify-end md:col-span-2 mt-4">
                        <button pButton type="submit" label="Create drone" icon="pi pi-plus"></button>
                    </div>
                </form>
            </p-accordion-content> </p-accordion-panel
    ></p-accordion>
</div>
