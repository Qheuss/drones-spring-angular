<div class="card">
    <p-table [value]="props" [tableStyle]="{ 'min-width': '30rem' }">
        <ng-template #header>
            <tr>
                <th>ID</th>
                <th>Model</th>
                <th>Spec</th>
            </tr>
        </ng-template>
        <ng-template #body let-prop>
            <tr>
                <td>{{ prop.id }}</td>
                <td>{{ prop.model }}</td>
                <td>{{ prop.spec }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
