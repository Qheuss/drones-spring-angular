<div class="card">
    <p-table [value]="motors" [tableStyle]="{ 'min-width': '30rem' }">
        <ng-template #header>
            <tr>
                <th>ID</th>
                <th>Model</th>
                <th>KV Rating</th>
            </tr>
        </ng-template>
        <ng-template #body let-motor>
            <tr>
                <td>{{ motor.id }}</td>
                <td>{{ motor.model }}</td>
                <td>{{ motor.kvRating }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
